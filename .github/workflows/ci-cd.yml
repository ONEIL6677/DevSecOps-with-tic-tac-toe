name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - .github/workflows/README.md
      - kubernetes/deployment.yaml

  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  ########################################
  # TEST
  ########################################
  test:
    name: Unit Testing
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Unit Tests
        run: |
          npm test || echo "No tests available"

  ########################################
  # LINT
  ########################################
  lint:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run ESLint
        run: npm run lint

  ########################################
  # BUILD
  ########################################
  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/

  ########################################
  # DOCKER
  ########################################
  docker:
    name: Docker Build Scan Push
    runs-on: ubuntu-latest
    needs: build

    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Image Tag
        id: vars
        run: |
          echo "tag=sha-${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          push: false
          tags: local-image:latest

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: local-image:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.tag }}

  ########################################
  # UPDATE KUBERNETES MANIFEST
  ########################################
  update-k8s:
    name: Update Kubernetes Deployment
    runs-on: ubuntu-latest

    needs: docker

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Update deployment image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${{ needs.docker.outputs.image_tag }}"

          sed -i "s|image:.*|image: ${IMAGE}|g" kubernetes/deployment.yaml

          echo "Deployment updated to:"
          grep image kubernetes/deployment.yaml

      - name: Commit Changes
        run: |
          git add kubernetes/deployment.yaml
          git commit -m "Update deployment image [skip ci]" || echo "Nothing to commit"

      - name: Push Changes
        run: |
          git push