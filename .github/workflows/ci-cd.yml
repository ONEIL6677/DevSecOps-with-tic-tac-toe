name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - .github/workflows/README.md
      - kubernetes/deployment.yaml

  pull_request:
    branches:
      - main


# Required permissions for GHCR and updating Kubernetes files
permissions:
  contents: write
  packages: write


env:
  REGISTRY: ghcr.io


jobs:

  ########################################
  # UNIT TESTING
  ########################################

  test:

    name: Unit Testing

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm


      - name: Install Dependencies
        run: npm ci


      - name: Run Tests
        run: |
          npm test || echo "No tests configured"


  ########################################
  # LINTING
  ########################################

  lint:

    name: Static Code Analysis

    runs-on: ubuntu-latest

    needs: test


    steps:

      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm


      - name: Install Dependencies
        run: npm ci


      - name: ESLint Check
        run: npm run lint



  ########################################
  # BUILD APPLICATION
  ########################################


  build:

    name: Build Application

    runs-on: ubuntu-latest

    needs:
      - lint


    steps:


      - name: Checkout Code
        uses: actions/checkout@v4



      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm



      - name: Install Dependencies
        run: npm ci



      - name: Build Project
        run: npm run build



      - name: Upload Build Files
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist/



  ########################################
  # DOCKER BUILD SECURITY SCAN AND PUSH
  ########################################


  docker:


    name: Docker Build Scan Push


    runs-on: ubuntu-latest


    needs:
      - build


    outputs:

      image_tag:
        ${{ steps.version.outputs.tag }}


    steps:


      - name: Checkout Code
        uses: actions/checkout@v4



      - name: Download Build Files
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: dist/



      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3



      # Convert repository name to lowercase
      # GHCR does not allow uppercase names

      - name: Convert Repository Name
        id: repo
        run: |

          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          echo "repository=$REPO" >> $GITHUB_OUTPUT



      - name: Login to GHCR
        uses: docker/login-action@v3
        with:

          registry: ghcr.io

          username: ${{ github.actor }}

          password: ${{ secrets.GITHUB_TOKEN }}



      - name: Generate Image Version
        id: version
        run: |

          TAG="sha-${GITHUB_SHA}"

          echo "tag=$TAG" >> $GITHUB_OUTPUT



      ################################
      # Build local image for scanning
      ################################


      - name: Build Docker Image For Scan

        uses: docker/build-push-action@v6

        with:

          context: .

          load: true

          push: false

          tags:

            local-image:test



      ################################
      # Security Scan
      ################################


      - name: Trivy Image Scan

        uses: aquasecurity/trivy-action@0.28.0

        with:

          image-ref: local-image:test

          format: table

          exit-code: 1

          ignore-unfixed: true

          vuln-type: os,library

          severity: CRITICAL,HIGH



      ################################
      # Push Image To GHCR
      ################################


      - name: Build And Push Image

        uses: docker/build-push-action@v6

        with:

          context: .

          push: true


          tags: |

            ghcr.io/${{ steps.repo.outputs.repository }}:latest

            ghcr.io/${{ steps.repo.outputs.repository }}:${{ steps.version.outputs.tag }}




  ########################################
  # UPDATE KUBERNETES DEPLOYMENT
  ########################################


  update-k8s:


    name: Update Kubernetes Manifest


    runs-on: ubuntu-latest


    needs:

      - docker


    if:

      github.ref == 'refs/heads/main' && github.event_name == 'push'



    steps:



      - name: Checkout Repository

        uses: actions/checkout@v4

        with:

          token: ${{ secrets.GITHUB_TOKEN }}



      - name: Configure Git

        run: |

          git config user.name "github-actions"

          git config user.email "github-actions@github.com"



      - name: Update Kubernetes Image


        run: |


          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')


          IMAGE="ghcr.io/${REPO}:sha-${GITHUB_SHA}"


          sed -i "s|image:.*|image: ${IMAGE}|g" kubernetes/deployment.yaml


          echo "New Kubernetes Image:"

          grep image kubernetes/deployment.yaml




      - name: Commit Kubernetes Update


        run: |


          git add kubernetes/deployment.yaml


          git commit -m "Update Kubernetes image [skip ci]" || echo "No changes"



      - name: Push Changes


        run: |

          git push